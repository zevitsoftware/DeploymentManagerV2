appId: com.zevitsoft.deployment-manager
productName: Zevitsoft Deployment Manager
copyright: Copyright © 2024 Zevitsoft

directories:
  buildResources: resources
  output: dist

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!scripts/**'
  - '!ProgressReport/**'
  - '!*.md'

asarUnpack:
  - resources/**
  # Worker JS files must be on real disk — Piscina cannot spawn threads from
  # inside the .asar VFS. They land in app.asar.unpacked/out/main/workers/
  - out/main/workers/**

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  icon: resources/icon.png
  executableName: ZevitsoftDeploymentManager
  # Code signing is disabled via CSC_IDENTITY_AUTO_DISCOVERY=false in the
  # build script + forceCodeSigning: false below.
  # signAndEditExecutable MUST remain true (default) so electron-builder can
  # embed the asar integrity hash into the exe. Without it, Electron 39+
  # crashes on startup with exception 0x80000003 (integrity check failure).
  target:
    - target: portable
      arch: x64

nsis:
  artifactName: ZevitsoftDeploymentManager-${version}-Setup.${ext}
  shortcutName: Zevitsoft Deployment Manager
  uninstallDisplayName: Zevitsoft Deployment Manager
  createDesktopShortcut: always
  createStartMenuShortcut: true
  oneClick: false
  allowToChangeInstallationDirectory: true

portable:
  artifactName: ZevitsoftDeploymentManager-${version}-Portable.${ext}
  # Run with current user privileges — avoids UAC prompts blocking launch
  requestExecutionLevel: user
  # Use a fixed unpack dir name so Windows Defender doesn't flag random temp dirs
  unpackDirName: ZevitsoftDeploymentManager

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  icon: resources/icon.icns
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false

dmg:
  artifactName: ZevitsoftDeploymentManager-${version}.${ext}

# ── Linux ─────────────────────────────────────────────────────────────────────
linux:
  icon: resources/icon.png
  target:
    - AppImage
    - deb
  maintainer: Zevitsoft <support@zevitsoft.com>
  category: Utility

appImage:
  artifactName: ZevitsoftDeploymentManager-${version}.${ext}

# ── Misc ──────────────────────────────────────────────────────────────────────
npmRebuild: false
asar: true
# Prevent electron-builder from forcing code signing when no cert is configured
forceCodeSigning: false

publish:
  provider: generic
  url: https://releases.zevitsoft.com/deployment-manager
